<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The AI Race — Frontier AI benchmarks & costs over time</title>
  <meta name="description" content="Analysing the performance and cost of AI models against leading benchmarks over time. The AI Race tracks OpenAI, Anthropic, Google, xAI, and Chinese labs.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ai-race.vercel.app/">
  <meta property="og:title" content="The AI Race">
  <meta property="og:description" content="Analysing the performance and cost of AI models against leading benchmarks over time.">
  <meta property="og:image" content="https://ai-race.vercel.app/api/og">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The AI Race">
  <meta name="twitter:description" content="Analysing the performance and cost of AI models against leading benchmarks over time.">
  <meta name="twitter:image" content="https://ai-race.vercel.app/api/og">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>The AI Race</h1>
    <p class="subtitle">Up-to-date charts & AI commentary, to feed your latest FOMO / Doomsday pitch</p>
  </header>

  <main>
    <div class="controls">
      <div class="mode-toggle" role="tablist">
        <button class="mode-btn active" data-mode="frontier" role="tab" aria-selected="true">AI Frontier</button>
        <button class="mode-btn" data-mode="race" role="tab" aria-selected="false">Lab Race</button>
        <button class="mode-btn" data-mode="cost" role="tab" aria-selected="false">Cost of Intelligence</button>
      </div>
      <select id="dateRange" class="date-range-select">
        <option value="all-time" selected>All-time</option>
        <option value="last-12-months">Last 12 months</option>
        <option value="last-6-months">Last 6 months</option>
        <option value="last-3-months">Last 3 months</option>
        <!-- Year options populated dynamically by app.js -->
      </select>
    </div>

    <div class="filter-pills" id="filterPills" role="tablist" aria-label="Filter selector">
      <!-- Populated by app.js: benchmark tabs in race mode, lab tabs in frontier mode -->
    </div>

    <div class="chart-container">
      <div class="chart-actions">
        <button class="chart-action-btn" id="copyChartBtn" title="Copy chart to clipboard">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/>
            <path d="M10.5 5.5V3.5a1.5 1.5 0 00-1.5-1.5H3.5A1.5 1.5 0 002 3.5V9a1.5 1.5 0 001.5 1.5h2"/>
          </svg>
        </button>
        <button class="chart-action-btn" id="downloadChartBtn" title="Download chart as PNG">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v8.5M4.5 7.5L8 11l3.5-3.5M2.5 13h11"/>
          </svg>
        </button>
      </div>
      <div id="chartLegend" class="chart-legend"></div>
      <div class="chart-canvas-wrapper">
        <canvas id="benchmarkChart"></canvas>
      </div>
      <div class="chart-citation" id="chartCitation"></div>
    </div>

    <div class="analysis-section" id="analysisSection">
      <!-- Populated by app.js: cached analysis from Supabase -->
    </div>

    <div class="info-card" id="infoCard">
      <!-- Populated by app.js -->
    </div>
  </main>

  <footer>
    <span>By Jack Richardson</span>
    <a href="https://www.linkedin.com/in/jack-richardson-b521ab147/" target="_blank" rel="noopener noreferrer" class="footer-linkedin" title="LinkedIn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </a>
    <span>&</span>
    <span>Claude Code</span>
  </footer>

  <script src="data-loader.js"></script>
  <script src="app.js"></script>
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
