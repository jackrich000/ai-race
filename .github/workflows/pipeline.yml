name: Weekly Pipeline

on:
  schedule:
    # Thursday 11 PM UTC (Thursday evening US time)
    - cron: '0 23 * * 4'
  workflow_dispatch:
    inputs:
      force_regen_analyses:
        description: "Force analyses regeneration even if no changes (for prompt/model changes)"
        type: boolean
        default: false

permissions:
  issues: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Validate extraction targets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/validate-extraction.mjs

      - name: Run pipeline
        id: pipeline
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-pipeline.mjs

      - name: Regenerate analyses
        id: analyses
        if: success() && (steps.pipeline.outputs.should_regen_analyses == 'true' || github.event.inputs.force_regen_analyses == 'true')
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-analyses.js

      - name: Report analysis failures
        if: always() && steps.analyses.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=$(gh issue list --label pipeline-report --limit 1 --json number --jq '.[0].number')
          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --body "**Analysis regeneration failed.** Some presets may be serving stale data. Check the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          fi

      - name: Notify on pipeline failure
        if: failure() && steps.pipeline.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[Pipeline] $(date +%Y-%m-%d): FAILED" \
            --body "The weekly pipeline failed. Check the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --label "pipeline-report"
